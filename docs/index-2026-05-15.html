    // タグ 一覧 (重複削除 + 出現順)
    const allTags = (() => {
      const set = new Set();
      docs.forEach(d => d.tags.forEach(t => set.add(t)));
      return [...set].sort((a, b) => a.localeCompare(b, "ja"));
    })();

    const state = {
      query: "",
      sort: "date-desc",
      selectedTags: new Set(),
      mode: "OR"
    };

    // --- レンダリング ---

    function renderTagButtons() {
      const container = document.getElementById("tag-buttons");
      container.innerHTML = "";
      allTags.forEach(tag => {
        const btn = document.createElement("button");
        btn.className = "tag-btn";
        btn.textContent = tag;
        btn.dataset.tag = tag;
        if (tag === "前提崩壊") btn.classList.add("special");
        btn.addEventListener("click", () => {
          if (state.selectedTags.has(tag)) state.selectedTags.delete(tag);
          else state.selectedTags.add(tag);
          renderTagButtons();
          renderDocs();
        });
        if (state.selectedTags.has(tag)) btn.classList.add("active");
        container.appendChild(btn);
      });
    }

    function renderDocs() {
      const list = document.getElementById("doc-list");
      const empty = document.getElementById("empty-state");
      list.innerHTML = "";

      const q = state.query.toLowerCase();

      const filtered = docs.filter(d => {
        // 検索フィルタ
        if (q) {
          const hay = (d.title + " " + d.file + " " + d.summary + " " + d.tags.join(" ")).toLowerCase();
          if (!hay.includes(q)) return false;
        }
        // タグフィルタ
        if (state.selectedTags.size > 0) {
          if (state.mode === "AND") {
            for (const t of state.selectedTags) {
              if (!d.tags.includes(t)) return false;
            }
            return true;
          } else {
            return d.tags.some(t => state.selectedTags.has(t));
          }
        }
        return true;
      });

      // ソート
      filtered.sort((a, b) => {
        switch (state.sort) {
          case "date-desc": return b.created.localeCompare(a.created);
          case "date-asc":  return a.created.localeCompare(b.created);
          case "title":     return a.title.localeCompare(b.title, "ja");
          case "file":      return a.file.localeCompare(b.file);
        }
      });

      // count 表示
      document.getElementById("visible-count").textContent = filtered.length;
      document.getElementById("total-count").textContent = docs.length;
      document.getElementById("active-filters").textContent =
        (state.selectedTags.size > 0 ? `タグ: ${[...state.selectedTags].join(" " + state.mode + " ")}` : "") +
        (q ? (state.selectedTags.size > 0 ? " / " : "") + `検索: "${q}"` : "");

      empty.classList.toggle("hidden", filtered.length > 0);

      filtered.forEach(d => {
        const card = document.createElement("article");
        card.className = "doc-card " + (d.color || "default");

        const head = document.createElement("div");
        head.className = "head";
        head.innerHTML = `
          <div class="title"><a href="${d.file}">${d.title}</a></div>
          <div class="date">${d.created.replace("T", " ")}</div>
        `;

        const filename = document.createElement("div");
        filename.className = "filename";
        filename.textContent = d.file;

        const summary = document.createElement("div");
        summary.className = "summary";
        summary.textContent = d.summary;

        const tags = document.createElement("div");
        tags.className = "tags";
        d.tags.forEach(t => {
          const pill = document.createElement("span");
          pill.className = "tag-pill";
          if (t === "Ultrathink") pill.classList.add("tag-ultrathink");
          if (t === "前提崩壊") pill.classList.add("tag-deprecated");
          if (t === "戦略" || t === "接点戦略") pill.classList.add("tag-strategy");
          if (t === "台本") pill.classList.add("tag-script");
          if (t === "計画") pill.classList.add("tag-planning");
          pill.textContent = t;
          tags.appendChild(pill);
        });

        card.appendChild(head);
        card.appendChild(filename);
        card.appendChild(summary);
        card.appendChild(tags);
        list.appendChild(card);
      });
    }

    // --- イベント ---

    document.getElementById("search").addEventListener("input", (e) => {
      state.query = e.target.value;
      renderDocs();
    });

    document.getElementById("sort").addEventListener("change", (e) => {
      state.sort = e.target.value;
      renderDocs();
    });

    document.getElementById("mode-toggle").addEventListener("click", (e) => {
      if (e.target.tagName === "BUTTON") {
        state.mode = e.target.dataset.mode;
        document.querySelectorAll("#mode-toggle button").forEach(b =>
          b.classList.toggle("active", b.dataset.mode === state.mode)
        );
        renderDocs();
      }
    });

    document.getElementById("clear-tags").addEventListener("click", () => {
      state.selectedTags.clear();
      renderTagButtons();
      renderDocs();
    });

    // 初期レンダリング
    renderTagButtons();
    renderDocs();
  </script>
</body>
</html>
