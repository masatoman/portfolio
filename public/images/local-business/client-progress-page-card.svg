  <text x="200" y="444" fill="#071B49" font-size="22" font-weight="900" font-family="Arial, sans-serif">基礎工事</text>
  <text x="200" y="468" fill="#5F6F89" font-size="16" font-weight="700" font-family="Arial, sans-serif">2026年3月8日 完了 / 写真 32枚</text>
  <rect x="916" y="428" width="100" height="32" rx="16" fill="#DCFCE7"/>
  <text x="966" y="450" fill="#166534" font-size="16" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">完了</text>

  <!-- Step 3: 完了 -->
  <circle cx="156" cy="514" r="20" fill="#F97316"/>
  <text x="156" y="521" fill="white" font-size="20" font-weight="900" text-anchor="middle" font-family="Arial, sans-serif">✓</text>
  <text x="200" y="510" fill="#071B49" font-size="22" font-weight="900" font-family="Arial, sans-serif">上棟</text>
  <text x="200" y="534" fill="#5F6F89" font-size="16" font-weight="700" font-family="Arial, sans-serif">2026年4月2日 完了 / 写真 24枚</text>
