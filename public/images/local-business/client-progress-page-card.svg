  <text x="200" y="402" fill="#5F6F89" font-size="16" font-weight="700" font-family="Arial, sans-serif">2026年2月12日 完了</text>
  <rect x="916" y="362" width="100" height="32" rx="16" fill="#DCFCE7"/>
  <text x="966" y="384" fill="#166534" font-size="16" font-weight="800" text-anchor="middle" font-family="Arial, sans-serif">完了</text>

  <!-- Step 2: 完了 -->
  <circle cx="156" cy="448" r="20" fill="#3B82F6"/>
